<body>

<script>
const savedHash =
"6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b";

const API_KEY =
"e4d1a31ba8224449a266f6e6852bd491";

document
.getElementById("unlockBtn")
.addEventListener("click", checkPassword);

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
    now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();
const btn =
document.getElementById("generateBtn");

const signalBox =
document.getElementById("signalBox");

const signalInfo =
document.getElementById("signalInfo");

let signalRunning = false;

btn.addEventListener("click",()=>{

    if(signalRunning) return;

    signalRunning = true;

    btn.disabled = true;

    btn.innerHTML = "ANALYZING...";

    signalBox.className =
    "signal-box";

    signalBox.innerHTML =
    "SCAN";

    setTimeout(()=>{

        generateSignal();

    },2000);

});

async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);

    return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

async function checkPassword() {

    const entered =
    document.getElementById("passwordInput").value;

    const enteredHash =
    await sha256(entered);

    if (enteredHash === savedHash) {

        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";

    } else {

        document.getElementById("errorMsg").innerHTML =
        "Wrong Password";

    }
}
async function generateSignal(){

    const market =
document.getElementById("market").value;

const symbolMap = {
"AUDCAD":"AUD/CAD",
"AUDCHF":"AUD/CHF",
"AUDJPY":"AUD/JPY",
"AUDUSD":"AUD/USD",

"CADCHF":"CAD/CHF",
"CADJPY":"CAD/JPY",

"CHFJPY":"CHF/JPY",

"EURAUD":"EUR/AUD",
"EURCAD":"EUR/CAD",
"EURCHF":"EUR/CHF",
"EURGBP":"EUR/GBP",
"EURJPY":"EUR/JPY",
"EURUSD":"EUR/USD",

"GBPAUD":"GBP/AUD",
"GBPCAD":"GBP/CAD",
"GBPCHF":"GBP/CHF",
"GBPJPY":"GBP/JPY",
"GBPUSD":"GBP/USD",

"USDCAD":"USD/CAD",
"USDCHF":"USD/CHF",
"USDJPY":"USD/JPY"};

const symbol = symbolMap[market];

    const url =
    `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=1min&outputsize=100&apikey=${API_KEY}`;

    try{

    const response =
    await fetch(url);

    const data =
    await response.json();

    if(!data.values){

        signalBox.innerHTML =
        "NO DATA";

        btn.disabled = false;
        btn.innerHTML =
        "GENERATE SIGNAL";

        signalRunning = false;

        return;
    }

    const candles =
    data.values.reverse();

    analyzeMarket(candles);

}
catch(err){

    signalBox.innerHTML =
    "ERROR";

    btn.disabled = false;

    btn.innerHTML =
    "GENERATE SIGNAL";

    signalRunning = false;

    console.log(err);
}
}

function calculateEMA(prices, period){

    const k =
    2/(period+1);

    let ema =
    prices[0];

    for(let i=1;i<prices.length;i++){

        ema =
        prices[i]*k +
        ema*(1-k);

    }

    return ema;
}

function calculateRSI(prices, period=14){

    let gains = 0;
    let losses = 0;

    for(let i=1;i<=period;i++){

        const diff =
        prices[i]-prices[i-1];

        if(diff>0)
            gains+=diff;
        else
            losses-=diff;
    }

    const rs =
    gains/(losses||1);

    return 100-
    (100/(1+rs));
}

// =============================
// SIGNAL HISTORY
// =============================

function saveSignal(signal){

    let history = JSON.parse(localStorage.getItem("signalHistory")) || [];

    history.unshift(signal);

    if(history.length > 100){
        history = history.slice(0,100);
    }

    localStorage.setItem(
        "signalHistory",
        JSON.stringify(history)
    );

}

function updateSignalResult(id,result){

    let history = JSON.parse(localStorage.getItem("signalHistory")) || [];

    const index = history.findIndex(x=>x.id===id);

    if(index!==-1){

        history[index].result=result;

        localStorage.setItem(
            "signalHistory",
            JSON.stringify(history)
        );

    }

}

function analyzeMarket(candles){

    const closes =
    candles.map(
    c => parseFloat(c.close)
    );

    const ema9 =
    calculateEMA(closes,9);

    const ema21 =
    calculateEMA(closes,21);

    const ema50 =
    calculateEMA(closes,50);

    const rsi =
    calculateRSI(
    closes.slice(-15)
    );

    const last =
    closes[closes.length-1];
    
    const currentPrice =
    last;

    /* MANDATORY OVERBOUGHT OVERSOLD FILTER */

if(rsi >= 80){

    displaySignal(
        "NO SIGNAL",
        0,
        ema9,
        ema21,
        ema50,
        rsi,
        "OVERBOUGHT",
        currentPrice
    );

    btn.disabled = false;
    btn.innerHTML = "GENERATE SIGNAL";
    signalRunning = false;

    return;
}

if(rsi <= 20){

    displaySignal(
        "NO SIGNAL",
        0,
        ema9,
        ema21,
        ema50,
        rsi,
        "OVERSOLD",
        currentPrice
    );

    btn.disabled = false;
    btn.innerHTML = "GENERATE SIGNAL";
    signalRunning = false;

    return;
}

    const prev =
    closes[closes.length-2];

    let callScore = 0;
    let putScore = 0;
    
    const lastCandle =
candles[candles.length-1];

const prevCandle =
candles[candles.length-2];

    /* TREND */

    if(ema9 > ema21)
        callScore += 30;

    if(ema21 > ema50)
        callScore += 25;

    if(ema9 < ema21)
        putScore += 30;

    if(ema21 < ema50)
        putScore += 25;

    /* RSI */

    if(rsi > 55 && rsi < 75)
        callScore += 25;

    if(rsi < 45 && rsi > 25)
        putScore += 25;

    /* MOMENTUM */

    if(last > prev)
        callScore += 20;

    if(last < prev)
        putScore += 20;
        
    /* ENGULFING */

const bullishEngulf =
parseFloat(lastCandle.close) >
parseFloat(prevCandle.open) &&
parseFloat(lastCandle.open) <
parseFloat(prevCandle.close);

const bearishEngulf =
parseFloat(lastCandle.close) <
parseFloat(prevCandle.open) &&
parseFloat(lastCandle.open) >
parseFloat(prevCandle.close);

if(bullishEngulf)
    callScore += 25;

if(bearishEngulf)
    putScore += 25;
    
    /* TREND STRENGTH */

const trendStrength =
Math.abs(ema9 - ema50);

if(trendStrength > 0.00030){

    if(ema9 > ema50)
        callScore += 20;

    if(ema9 < ema50)
        putScore += 20;

}
    /* STRONG BREAK */

    if(
       last > prev &&
       ema9 > ema21
    )
        callScore += 10;

    if(
       last < prev &&
       ema9 < ema21
    )
        putScore += 10;
        
    /* REJECTION WICK */

const high =
parseFloat(lastCandle.high);

const low =
parseFloat(lastCandle.low);

const open =
parseFloat(lastCandle.open);

const close =
parseFloat(lastCandle.close);

const upperWick =
high - Math.max(open,close);

const lowerWick =
Math.min(open,close) - low;

if(
    lowerWick >
    Math.abs(close-open)*1.5
){
    callScore += 20;
}

if(
    upperWick >
    Math.abs(close-open)*1.5
){
    putScore += 20;
}

/* ATR VOLATILITY FILTER */

let atr = 0;

for(let i=1;i<15;i++){

    atr += Math.abs(
    closes[closes.length-i] -
    closes[closes.length-i-1]
    );

}

atr /= 14;

if(atr < 0.00008){

    displaySignal(
        "NO SIGNAL",
        0,
        ema9,
        ema21,
        ema50,
        rsi,
        "LOW VOLATILITY",
        currentPrice
    );

btn.disabled = false;
btn.innerHTML = "GENERATE SIGNAL";
signalRunning = false;

    return;
}

    /* RANGE FILTER */

    if(
       Math.abs(ema9 - ema21)
       <
       0.00005
    ){

        displaySignal(
    "NO SIGNAL",
    0,
    ema9,
    ema21,
    ema50,
    rsi,
    "RANGING",
    currentPrice
);
btn.disabled = false;
btn.innerHTML = "GENERATE SIGNAL";
signalRunning = false;

        return;
    }

    let signal =
    "NO SIGNAL";

    let strength =
    0;

    let trend =
    "SIDEWAYS";
btn.disabled = false;
btn.innerHTML = "GENERATE SIGNAL";
signalRunning = false;
    if(callScore >= 120){

        signal =
        "CALL";

        strength =
        callScore;

        trend =
        "BULLISH";

    }
    else if(putScore >= 120){

        signal =
        "PUT";

        strength =
        putScore;

        trend =
        "BEARISH";

    }

    displaySignal(
        signal,
        strength,
        ema9,
        ema21,
        ema50,
        rsi,
        trend,
        currentPrice
    );

    const tf =
    parseInt(
    document.getElementById(
    "timeframe"
    ).value
    );

    <!-- startCooldown(tf); -->

}

function displaySignal(
signal,
score,
ema9,
ema21,
ema50,
rsi,
trend,
currentPrice
){

    const market =
    document.getElementById("market").value;

    const now = new Date();

const entryTime =
new Date(now.getTime() + 60000);

const entry =
entryTime.toLocaleTimeString();
    
    signalBox.className =
    "signal-box";

    if(signal==="CALL")
        signalBox.classList.add(
        "call"
        );

    if(signal==="PUT")
        signalBox.classList.add(
        "put"
        );

    signalBox.innerHTML =
    signal;

signalInfo.innerHTML =
`
Market : ${market}<br>
Trend : ${trend}<br>
Current Price : ${currentPrice.toFixed(5)}<br>
Strength : ${score}%<br>
Entry Time : ${entry}<br>`;

// ===== Save Signal =====

if(signal === "CALL" || signal === "PUT"){

    const id = Date.now().toString();

    const tf = parseInt(document.getElementById("timeframe").value);

    const now = new Date();

    const entry = new Date(now);
    entry.setMinutes(entry.getMinutes()+1);
    entry.setSeconds(0);

    const expiry = new Date(entry);
    expiry.setMinutes(expiry.getMinutes()+tf);

    saveSignal({

        id:id,

        time:now.toLocaleString(),

        pair:market,

        signal:signal,

        confidence:score,

        entry:entry.toLocaleTimeString(),

        expiry:expiry.toLocaleTimeString(),

        result:"Pending"

    });

    checkTradeResult(
        id,
        signal,
        market,
        expiry
    );

}
}

function startCooldown(minutes){

    let seconds =
    minutes * 60;

    const timer =
    setInterval(()=>{

        seconds--;

        btn.innerHTML =
        `WAIT ${seconds}s`;

        if(seconds <= 0){

            clearInterval(timer);

            btn.disabled = false;

            btn.innerHTML =
            "GENERATE SIGNAL";

            signalRunning = false;

            signalBox.className =
            "signal-box";

            signalBox.innerHTML =
            "WAIT";

            signalInfo.innerHTML =
            `
            Market : --<br>
            Timeframe : --<br>
            Status : Ready
            `;

        }

    },1000);

}

async function checkTradeResult(
id,
signal,
market,
expiryTime
){

    const wait = expiryTime.getTime()-Date.now();

    if(wait<=0)return;

    setTimeout(async()=>{

        try{

            const symbolMap={

"AUDCAD":"AUD/CAD",
"AUDCHF":"AUD/CHF",
"AUDJPY":"AUD/JPY",
"AUDUSD":"AUD/USD",
"CADCHF":"CAD/CHF",
"CADJPY":"CAD/JPY",
"CHFJPY":"CHF/JPY",
"EURAUD":"EUR/AUD",
"EURCAD":"EUR/CAD",
"EURCHF":"EUR/CHF",
"EURGBP":"EUR/GBP",
"EURJPY":"EUR/JPY",
"EURUSD":"EUR/USD",
"GBPAUD":"GBP/AUD",
"GBPCAD":"GBP/CAD",
"GBPCHF":"GBP/CHF",
"GBPJPY":"GBP/JPY",
"GBPUSD":"GBP/USD",
"USDCAD":"USD/CAD",
"USDCHF":"USD/CHF",
"USDJPY":"USD/JPY"

            };

            const url=`https://api.twelvedata.com/time_series?symbol=${symbolMap[market]}&interval=1min&outputsize=2&apikey=${API_KEY}`;

            const res=await fetch(url);

            const data=await res.json();

            if(!data.values)return;

            const candles=data.values.reverse();

            const entryPrice=parseFloat(candles[0].close);

            const closePrice=parseFloat(candles[1].close);

            let result="DRAW";

            if(signal==="CALL"){

                result=closePrice>entryPrice?"WIN":"LOSS";

            }else{

                result=closePrice<entryPrice?"WIN":"LOSS";

            }

            updateSignalResult(id,result);

        }catch(e){

            console.log(e);

        }

    },wait);

}

</script>
