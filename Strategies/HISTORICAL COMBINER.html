    const data = new TextEncoder().encode(text);

    const hashBuffer = await crypto.subtle.digest("SHA-256", data);

    return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2,"0"))
        .join("");

}

// ===============================

// EMA
function calculateEMA(prices, period){

    const k = 2 / (period + 1);

    let ema = prices[0];

    for(let i = 1; i < prices.length; i++){

        ema = prices[i] * k + ema * (1 - k);

    }

    return ema;

}

// RSI
function calculateRSI(prices, period = 14){

    let gain = 0;
    let loss = 0;

    for(let i = prices.length - period; i < prices.length; i++){

        const diff = prices[i] - prices[i-1];

        if(diff > 0){

            gain += diff;

        }else{

            loss += Math.abs(diff);

        }

    }

    if(loss === 0) return 100;

    const rs = gain / loss;

    return 100 - (100 / (1 + rs));

}

// ATR
function calculateATR(candles, period = 14){

    let tr = [];

    for(let i = 1; i < candles.length; i++){

        const high = parseFloat(candles[i].high);
        const low = parseFloat(candles[i].low);
        const prevClose = parseFloat(candles[i-1].close);

        tr.push(

            Math.max(

                high - low,

                Math.abs(high - prevClose),

                Math.abs(low - prevClose)

            )

        );

    }

    let atr = 0;

    for(let i = tr.length-period; i < tr.length; i++){

        atr += tr[i];

    }

    return atr / period;

}

// Trend
function detectTrend(ema20, ema50, ema200){

    if(

        ema20 > ema50 &&
        ema50 > ema200

    ){

        return "STRONG UP";

    }

    if(

        ema20 < ema50 &&
        ema50 < ema200

    ){

        return "STRONG DOWN";

    }

    if(ema20 > ema50){

        return "UP";

    }

    if(ema20 < ema50){

        return "DOWN";

    }

    return "SIDEWAYS";

}

// ATR Quality
function getATRQuality(atr){

    if(atr < 0.00030){

        return "LOW";

    }

    if(atr < 0.00120){

        return "GOOD";

    }

    return "HIGH";

}

// Entry & Expiry
function getTradeTime(tf){

    const now = new Date();

    const entry = new Date(now);

    entry.setMinutes(entry.getMinutes()+1);

    entry.setSeconds(0);

    const expiry = new Date(entry);

    expiry.setMinutes(expiry.getMinutes()+tf);

    function f(v){

        return String(v).padStart(2,"0");

    }

    return{

        current:
        `${f(now.getHours())}:${f(now.getMinutes())}`,

        entry:
        `${f(entry.getHours())}:${f(entry.getMinutes())}`,

        expiry:
        `${f(expiry.getHours())}:${f(expiry.getMinutes())}`

    };

}

function analyzeMarket(candles){

    const closes = candles.map(c=>parseFloat(c.close));
    const opens  = candles.map(c=>parseFloat(c.open));

    // ===== PART 1 =====
    const ema20 = calculateEMA(closes,20);
    const ema50 = calculateEMA(closes,50);
    const ema200 = calculateEMA(closes,200);

    const rsi = calculateRSI(closes);

    const atr = calculateATR(candles);

    const trend = detectTrend(
        ema20,
        ema50,
        ema200
    );

    const atrStatus = getATRQuality(atr);

    const tradeTime = getTradeTime(
        parseInt(
            document.getElementById("timeframe").value
        )
    );
    // ==================

    const PATTERN_SIZE = 5;
    const EXPIRY = parseInt(
        document.getElementById("timeframe").value
    );

    if(closes.length < 100){
        signalBox.innerHTML = "NO DATA";
        return;
    }

    let currentPattern = [];

    for(let i=closes.length-PATTERN_SIZE;i<closes.length;i++){

        currentPattern.push(
            closes[i] > opens[i] ? 1 : 0
        );

    }

    // ===============================
// HISTORICAL PATTERN ENGINE
// ===============================

let matches = 0;

let callWins = 0;
let putWins = 0;

let historicalResults = [];

    for(let i=PATTERN_SIZE;i<closes.length-EXPIRY-1;i++){

    let same = true;

    for(let j=0;j<PATTERN_SIZE;j++){

        const a =
        closes[i-PATTERN_SIZE+j] >
        opens[i-PATTERN_SIZE+j] ? 1 : 0;

        if(a !== currentPattern[j]){

            same = false;
            break;

        }

    }

    if(!same) continue;

    matches++;

    const entryPrice = closes[i];
    const expiryPrice = closes[i+EXPIRY];

    if(expiryPrice > entryPrice){

        callWins++;
        historicalResults.push("CALL");

    }
    else if(expiryPrice < entryPrice){

        putWins++;
        historicalResults.push("PUT");

    }

}

const callRate =
matches ?
(callWins/matches)*100 : 0;

const putRate =
matches ?
(putWins/matches)*100 : 0;

const historicalWinRate =
Math.max(callRate, putRate);

if(historicalWinRate < 60){

    signalBox.className="signal-box";
    signalBox.innerHTML="NO SIGNAL";

    signalInfo.innerHTML=`
    Pattern Win Rate : ${historicalWinRate.toFixed(1)}%
    `;

    btn.disabled=false;
    btn.innerHTML="GENERATE SIGNAL";
    signalRunning=false;

    return;
}

const historicalDirection =
callRate >= putRate ?
"CALL" : "PUT";

// ===============================
// HISTORICAL SCORE
// ===============================

let historicalScore = 0;

// Pattern Win Rate
if(historicalWinRate >=90)
    historicalScore += 35;
else if(historicalWinRate >= 80)
    historicalScore += 30;
else if(historicalWinRate >= 70)
    historicalScore += 20;

// Pattern Matches
if(matches >= 20)
    historicalScore += 20;
else if(matches >= 15)
    historicalScore += 15;
else if(matches >= 10)
    historicalScore += 10;

// Trend
if(
    (historicalDirection=="CALL" && trend.includes("UP")) ||
    (historicalDirection=="PUT" && trend.includes("DOWN"))
){
    historicalScore += 20;
}

// RSI
if(
    (historicalDirection=="CALL" && rsi>=55 && rsi<=70) ||
    (historicalDirection=="PUT" && rsi<=45 && rsi>=30)
){
    historicalScore += 15;
}

// ATR
if(atrStatus=="GOOD")
    historicalScore += 10;

if(historicalScore>100)
    historicalScore=100;

// ===============================
// CONFIDENCE LABEL
// ===============================

let confidence="LOW";

if(historicalScore>=90)
    confidence="VERY HIGH";

else if(historicalScore>=80)
    confidence="HIGH";

else if(historicalScore>=70)
    confidence="MEDIUM";
// ===============================
// PREVIOUS HISTORICAL RESULTS
// ===============================

const previous3 =
historicalResults
.slice(-3)
.reverse();

let previousResult =
"--";

if(previous3.length){

    const callCount =
    previous3.filter(x=>x=="CALL").length;

    const putCount =
    previous3.filter(x=>x=="PUT").length;

    if(callCount>=putCount)
        previousResult=`CALL ${callCount}/3`;

    else
        previousResult=`PUT ${putCount}/3`;

}

    // ===============================
// DISPLAY RESULT
// ===============================

if(matches < 10){

    signalBox.className="signal-box";
    signalBox.innerHTML="NO SIGNAL";

    signalInfo.innerHTML=`
    Historical data is insufficient.<br>
    Pattern Matches : ${matches}
    `;

    btn.disabled=false;
    btn.innerHTML="GENERATE SIGNAL";
    signalRunning=false;

    return;

}

signalBox.className="signal-box";

if(historicalDirection=="CALL")
    signalBox.classList.add("call");
else
    signalBox.classList.add("put");

signalBox.innerHTML=historicalDirection;

const market =
document.getElementById("market").value;

signalInfo.innerHTML = `
<pre style="
margin:0;
font-family:Consolas,monospace;
font-size:14px;
line-height:1.7;
color:#fff;
white-space:pre-wrap;
">

══════════════════════════════
      ELEVATE AI SIGNAL
══════════════════════════════
PAIR        ${market}
SIGNAL      ${historicalDirection=="CALL" ? "🟢 CALL" : "🔴 PUT"}
CONFIDENCE  ${historicalScore}% (${confidence})

ENTRY        ${tradeTime.entry}
EXPIRY       ${tradeTime.expiry}
━━━━━━━━━━━━━━━━━━━━━━
Trend        ${trend.includes("UP") ? "✅ Strong Up" : trend.includes("DOWN") ? "✅ Strong Down" : "⚠ Sideways"}
Historical   ✅ ${matches} Matches
Win Rate     ✅ ${historicalWinRate.toFixed(1)}%
EMA          ${trend.includes("UP") ? "✅ Bullish" : trend.includes("DOWN") ? "✅ Bearish" : "⚠ Mixed"}
RSI          ${rsi>=55 ? "✅ " : "⚠ "}${rsi.toFixed(1)}
ATR          ${atrStatus=="GOOD" ? "✅ Good" : atrStatus=="HIGH" ? "🔥 High" : "⚠ Low"}
Momentum     ${historicalDirection=="CALL" ? "🟢 Strong" : "🔴 Strong"}
Structure    ${trend.includes("UP") ? "🟢 Bullish" : trend.includes("DOWN") ? "🔴 Bearish" : "⚠ Neutral"}
Candle       ${historicalDirection=="CALL" ? "🟢 Strong Bullish" : "🔴 Strong Bearish"}
━━━━━━━━━━━━━━━━━━━━━━

</pre>
`;
saveSignal({

time:new Date().toLocaleString(),

pair:market,

signal:historicalDirection,

confidence:historicalScore,

entry:tradeTime.entry,

expiry:tradeTime.expiry

});

btn.disabled=false;
btn.innerHTML="GENERATE SIGNAL";
signalRunning=false;
}

function displaySignal(
signal,
score,
ema9,
ema21,
ema50,
rsi,
trend,
currentPrice
){

    const market =
    document.getElementById("market").value;
    
    signalBox.className =
    "signal-box";

    if(signal==="CALL")
        signalBox.classList.add(
        "call"
        );

    if(signal==="PUT")
        signalBox.classList.add(
        "put"
        );

    signalBox.innerHTML =
    signal;

    signalInfo.innerHTML =
    `
    Market : ${market}<br>
    Trend : ${trend}<br>
    Current Price : ${currentPrice.toFixed(5)}<br>
    Strength : ${score}%<br>
    RSI : ${rsi.toFixed(1)}<br>
    EMA9 : ${ema9.toFixed(5)}<br>
    EMA21 : ${ema21.toFixed(5)}<br>
    EMA50 : ${ema50.toFixed(5)}
    `;
}

function toggleMenu(){

const sidebar=document.getElementById("sidebar");

const overlay=document.getElementById("overlay");

if(sidebar.style.left==="0px"){

sidebar.style.left="-280px";

overlay.style.display="none";

}else{

sidebar.style.left="0px";

overlay.style.display="block";

}

}

function startCooldown(minutes){

    let seconds =
    minutes * 60;

    const timer =
    setInterval(()=>{

        seconds--;

        btn.innerHTML =
        `WAIT ${seconds}s`;

        if(seconds <= 0){

            clearInterval(timer);

            btn.disabled = false;

            btn.innerHTML =
            "GENERATE SIGNAL";

            signalRunning = false;

            signalBox.className =
            "signal-box";

            signalBox.innerHTML =
            "WAIT";

            signalInfo.innerHTML =
            `
            Market : --<br>
            Timeframe : --<br>
            Status : Ready
            `;

        }

    },1000);

}

function updateDashboard(){

const history=JSON.parse(localStorage.getItem("signalHistory"))||[];

document.getElementById("todaySignals").innerHTML=history.length;

if(history.length){

let total=0;

history.forEach(h=>{

total+=Number(h.confidence);

});

document.getElementById("confidenceCard").innerHTML=

(total/history.length).toFixed(1)+"%";

}else{

document.getElementById("confidenceCard").innerHTML="--";

}

document.getElementById("winRateCard").innerHTML="--%";

}

updateDashboard();

</script>
